<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="Admission Management & CRM System — Manage college admissions, quotas, and applicants"
    />
    <title>Admission CRM — College Admission Management System</title>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0;
    padding: 0;
    background-color: #eff6ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #initial-loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #eff6ff 0%, #ffffff 50%, #eef2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.15s ease;
  }

  .loader-logo {
    width: 72px; height: 72px;
    background: #2563eb;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 16px 32px rgba(37,99,235,0.25);
    animation: logoPopIn 0.2s ease-out forwards;
  }

  .loader-title {
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 4px;
    animation: fadeInUp 0.2s ease-out 0.1s both;
  }

  .loader-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 24px;
    animation: fadeInUp 0.2s ease-out 0.15s both;
  }

  .shimmer-container {
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeInUp 0.2s ease-out 0.2s both;
  }

  .shimmer-bar {
    height: 8px;
    background: #e2e8f0;
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .shimmer-bar:nth-child(2) { width: 75%; }
  .shimmer-bar:nth-child(3) { width: 55%; }

  .shimmer-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.9),
      transparent
    );
    animation: shimmer 0.8s infinite linear;
  }

  .shimmer-bar:nth-child(2)::after { animation-delay: 0.1s; }
  .shimmer-bar:nth-child(3)::after { animation-delay: 0.2s; }

  .loader-dots {
    display: flex;
    gap: 6px;
    margin-top: 20px;
    animation: fadeInUp 0.2s ease-out 0.25s both;
  }

  .loader-dot {
    width: 7px; height: 7px;
    background: #3b82f6;
    border-radius: 50%;
    animation: dotPulse 0.6s ease-in-out infinite;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.15s; }
  .loader-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes logoPopIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  @keyframes fadeInUp {
    from { transform: translateY(10px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  @keyframes shimmer {
    from { left: -100%; }
    to   { left:  200%; }
  }

  @keyframes dotPulse {
    0%,100% { transform: scale(1);   opacity: 0.4; }
    50%     { transform: scale(1.3); opacity: 1;   }
  }
</style>

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Initial loader shown before React mounts -->
    <div id="initial-loader">
      <div class="loader-logo">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="loader-title">Admission CRM</div>
      <div class="loader-subtitle">Loading your workspace...</div>
      <div class="shimmer-container">
        <div class="shimmer-bar"></div>
        <div class="shimmer-bar"></div>
        <div class="shimmer-bar"></div>
      </div>
      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>

    <div id="root"></div>

    <!-- Hide loader once React mounts -->
    <script>
     // Hide loader as soon as React root renders
var observer = new MutationObserver(function () {
  var root = document.getElementById('root')
  if (root && root.children.length > 0) {
    var loader = document.getElementById('initial-loader')
    if (loader) {
      loader.style.transition = 'opacity 0.15s ease'
      loader.style.opacity = '0'
      setTimeout(function () {
        loader.style.display = 'none'
      }, 150)
    }
    observer.disconnect()
  }
})
observer.observe(document.getElementById('root'), {
  childList: true,
  subtree: true
})

// Fallback — hide after 3 seconds no matter what
setTimeout(function () {
  var loader = document.getElementById('initial-loader')
  if (loader) {
    loader.style.display = 'none'
  }
}, 3000)
    </script>
  </body>
</html>
